version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: us-east-1
    IMAGE_REPO_NAME: brain-tasks-app
    IMAGE_TAG: latest

phases:

  pre_build:
    commands:
      - echo Logging in to Amazon ECR
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin 106760547958.dkr.ecr.us-east-1.amazonaws.com

  build:
    commands:
      - echo Build started
      - docker build -t $IMAGE_REPO_NAME .
      - docker tag $IMAGE_REPO_NAME:latest 106760547958.dkr.ecr.us-east-1.amazonaws.com/jwala/brain-tasks-app/$IMAGE_REPO_NAME:$IMAGE_TAG

  post_build:
    commands:
      - echo Pushing image
      - docker push 106760547958.dkr.ecr.us-east-1.amazonaws.com/jwala/brain-tasks-app/$IMAGE_REPO_NAME:$IMAGE_TAG
      - kubectl apply -f k8s/deployment.yaml
      - kubectl apply -f k8s/service.yaml
