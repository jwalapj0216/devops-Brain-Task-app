version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 106760547958.dkr.ecr.us-east-1.amazonaws.com
      - REPOSITORY_URI=106760547958.dkr.ecr.us-east-1.amazonaws.com/jwala/brain-tasks-app
      - IMAGE_TAG=latest

  build:
    commands:
      - echo Building Docker image
      - docker build -t brain-tasks-app .
      - docker tag brain-tasks-app:latest $REPOSITORY_URI:$IMAGE_TAG

  post_build:
    commands:
      - echo Pushing image to ECR
      - docker push $REPOSITORY_URI:$IMAGE_TAG
