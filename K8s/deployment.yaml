apiVersion: apps/v1
kind: Deployment
metadata:
  name: brain-tasks-deployment
  namespace: brain
spec:
  replicas: 1
  selector:
    matchLabels:
      app: brain-tasks
  template:
    metadata:
      labels:
        app: brain-tasks
    spec:
      containers:
      - name: brain-tasks
        image: 106760547958.dkr.ecr.us-east-1.amazonaws.com/jwala/brain-tasks-app:latest
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
        
